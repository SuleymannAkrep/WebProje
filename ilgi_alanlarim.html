<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .card-img-top { height: 350px; object-fit: cover; }
    </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <div class="navbar-nav">
            <a class="nav-link" href="index.html">Anasayfa</a>
            <a class="nav-link" href="hakkinda.html">Hakkında</a>
            <a class="nav-link" href="ozgecmis.html">Özgeçmiş</a>
            <a class="nav-link" href="sehrim.html">Şehrim</a>
            <a class="nav-link" href="ilgi.html">İlgi Alanlarım</a>
            <a class="nav-link active" href="iletisim.html">İletişim</a>
            <a class="nav-link" href="login.html">Login</a>
        </div>
    </div>
</nav>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">Web Proje</a>
            <div class="navbar-nav">
                <a class="nav-link" href="hakkinda.html">Hakkında</a>
                <a class="nav-link" href="ozgecmis.html">Özgeçmiş</a>
                <a class="nav-link" href="sehrim.html">Şehrim</a>
                <a class="nav-link active" href="ilgi.html">İlgi Alanlarım</a>
                <a class="nav-link" href="iletisim.html">İletişim</a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <header class="text-center mb-5">
            <h1>İlgi Alanlarım</h1>
            <p class="lead">Takip ettiğim popüler diziler (TV Maze API Entegrasyonu)</p>
        </header>
        
        <div id="dizi-listesi" class="row g-4">
            <div class="text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Yükleniyor...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Ücretsiz ve Key gerektirmeyen dizi API'si 
        async function verileriGetir() {
            try {
                // 'Marvel' araması yaparak ilgili dizileri getiriyoruz
                const response = await fetch('https://api.tvmaze.com/search/shows?q=marvel');
                const data = await response.json();
                
                const container = document.getElementById('dizi-listesi');
                container.innerHTML = ''; // Spinner'ı temizle

                data.forEach(item => {
                    const dizi = item.show;
                    // Resim yoksa varsayılan bir görsel koy
                    const resim = dizi.image ? dizi.image.medium : 'https://via.placeholder.com/210x295?text=Resim+Yok';
                    
                    container.innerHTML += `
                        <div class="col-md-4 col-lg-3">
                            <div class="card h-100 shadow-sm border-0">
                                <img src="${resim}" class="card-img-top" alt="${dizi.name}">
                                <div class="card-body d-flex flex-column">
                                    <h5 class="card-title">${dizi.name}</h5>
                                    <p class="card-text text-muted small">Dil: ${dizi.language}</p>
                                    <p class="card-text text-muted small">Puan: ${dizi.rating.average || 'Yok'}</p>
                                    <a href="${dizi.url}" target="_blank" class="btn btn-outline-primary btn-sm mt-auto">Detaylar</a>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("API Hatası:", error);
                document.getElementById('dizi-listesi').innerHTML = '<p class="text-danger text-center">Veriler yüklenirken bir hata oluştu.</p>';
            }
        }

        // Sayfa yüklendiğinde çalıştır
        verileriGetir();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

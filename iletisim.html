<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | Proje Ödevi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">Web Proje</a>
            <div class="navbar-nav">
                <a class="nav-link" href="hakkinda.html">Hakkında</a>
                <a class="nav-link" href="ozgecmis.html">Özgeçmiş</a>
                <a class="nav-link" href="sehrim.html">Şehrim</a>
                <a class="nav-link" href="ilgi.html">İlgi Alanlarım</a>
                <a class="nav-link active" href="iletisim.html">İletişim</a>
                <a class="nav-link" href="login.html">Login</a>
            </div>
        </div>
    </nav>

    <div class="container shadow-sm p-4 bg-white rounded">
        <h2 class="mb-4 text-center">İletişim Formu</h2>
        
        <form id="contactForm" action="iletisim_kontrol.php" method="POST">
            
            <div class="mb-3">
                <label class="form-label">Ad Soyad:</label>
                <input type="text" name="ad_soyad" id="ad_soyad" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">E-posta:</label>
                <input type="email" name="email" id="email" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Telefon:</label>
                <input type="text" name="telefon" id="telefon" class="form-control" placeholder="Sadece rakam giriniz">
            </div>

            <div class="mb-3">
                <label class="form-label">Konu Seçiniz:</label>
                <select name="konu" id="konu" class="form-select">
                    <option value="">Seçiniz...</option>
                    <option value="Destek">Destek</option>
                    <option value="Öneri">Öneri</option>
                    <option value="Şikayet">Şikayet</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label d-block">Cinsiyet:</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="cinsiyet" id="erkek" value="Erkek">
                    <label class="form-check-label" for="erkek">Erkek</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="cinsiyet" id="kadin" value="Kadın">
                    <label class="form-check-label" for="kadin">Kadın</label>
                </div>
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" name="onay" id="onay" class="form-check-input">
                <label class="form-check-label">Bilgilerimin doğruluğunu onaylıyorum.</label>
            </div>

            <hr>

            <div class="d-grid gap-2 d-md-flex justify-content-md-start mt-4">
                <button type="button" onclick="validateWithNativeJS()" class="btn btn-primary">Native JS ile Gönder</button>
                
                <button type="button" class="btn btn-success">Vue.js ile Gönder (Yakında)</button>
                
                <button type="reset" class="btn btn-secondary">Temizle</button>
            </div>
        </form>
    </div>

    <script>
        function validateWithNativeJS() {
            const ad = document.getElementById('ad_soyad').value;
            const email = document.getElementById('email').value;
            const telefon = document.getElementById('telefon').value;
            const konu = document.getElementById('konu').value;
            const onay = document.getElementById('onay').checked;
            
            // Email format kontrolü için Regex
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            // Telefon sadece rakam kontrolü
            const telRegex = /^[0-9]+$/;

            if (ad === "" || email === "" || telefon === "" || konu === "") {
                alert("Lütfen tüm zorunlu alanları doldurun!");
                return;
            }

            if (!emailRegex.test(email)) {
                alert("Lütfen geçerli bir e-posta adresi girin!");
                return;
            }

            if (!telRegex.test(telefon)) {
                alert("Telefon numarası sadece rakamlardan oluşmalıdır!");
                return;
            }

            if (!onay) {
                alert("Lütfen onay kutusunu işaretleyin!");
                return;
            }

            // Her şey doğruysa formu gönder
            alert("Native JS kontrolü başarılı! Veriler gönderiliyor...");
            document.getElementById('contactForm').submit();
        }
    </script>

</body>
</html>

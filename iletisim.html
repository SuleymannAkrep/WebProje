<div class="container mt-5" id="app">
    <div class="row justify-content-center">
        <div class="col-md-8 bg-white p-4 shadow-sm rounded">
            <h2 class="text-center mb-4">İletişim Formu</h2>
            
            <form id="contactForm" action="iletisim.php" method="POST"> 
                
                <div class="mb-3">
                    <label class="form-label">Ad Soyad:</label>
                    <input type="text" name="ad" id="ad" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">E-posta:</label>
                    <input type="email" name="email" id="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Telefon:</label>
                    <input type="text" name="telefon" id="telefon" class="form-control" placeholder="Sadece rakam giriniz">
                </div>

                <div class="mb-3">
                    <label class="form-label">Şehir Seçiniz:</label>
                    <select name="sehir" class="form-select">
                        <option value="istanbul">İstanbul</option>
                        <option value="sakarya">Sakarya</option>
                        <option value="ankara">Ankara</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label d-block">Cinsiyet:</label>
                    <input type="radio" name="cinsiyet" value="erkek"> Erkek
                    <input type="radio" name="cinsiyet" value="kadin" class="ms-3"> Kadın
                </div>

                <div class="mb-3">
                    <label class="form-label">Mesajınız:</label>
                    <textarea name="mesaj" id="mesaj" class="form-control" rows="3"></textarea>
                </div>

                <hr>
                <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                    <button type="button" onclick="validateWithNativeJS()" class="btn btn-primary">
                        Native JS ile Denetle ve Gönder
                    </button>

                    <button type="button" @click="validateWithVue" class="btn btn-success">
                        Vue.js ile Denetle ve Gönder
                    </button> [cite: 16, 27]
                </div>
            </form>
        </div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script> [cite: 16]

<script>
// 1. NATIVE JAVASCRIPT DENETİMİ
function validateWithNativeJS() {
    const email = document.getElementById('email').value;
    const telefon = document.getElementById('telefon').value;
    const telRegex = /^[0-9]+$/;

    if (email === "" || !email.includes("@")) {
        alert("Native JS: Lütfen geçerli bir e-posta formatı girin!");
    } else if (!telRegex.test(telefon)) {
        alert("Native JS: Telefon sadece rakamlardan oluşmalıdır!");
    } else {
        alert("Native JS Kontrolü Başarılı! Form PHP'ye iletiliyor.");
        document.getElementById('contactForm').submit();
    }
}

// 2. VUE.JS FRAMEWORK DENETİMİ
const { createApp } = Vue
createApp({
    methods: {
        validateWithVue() {
            const ad = document.getElementById('ad').value;
            const mesaj = document.getElementById('mesaj').value;
            
            if (ad === "" || mesaj === "") {
                alert("Vue.js: Ad ve Mesaj alanları boş bırakılamaz!");
            } else {
                alert("Vue.js Denetimi Başarılı! Form PHP'ye iletiliyor.");
                document.getElementById('contactForm').submit();
            }
        }
    }
}).mount('#app')
</script> [cite: 16, 27]
